app:
  host: 127.0.0.1
  port: 5055
  runtime_dir: runtime

paths:
  local_work_dir: work
  history_dir: history
  log_dir: logs
  quarantine_dir: quarantine
  quarantine_relative_root: ""
  inspection_dir: inspection
  keep_quarantine_after_success: false
  keep_failed_output_for_inspection: true

tools:
  ffmpeg: ffmpeg
  ffprobe: ffprobe

libraries:
  roots:
    - D:/Media/Movies
    - D:/Media/Series

scan:
  selected_folders: []
  priority_probe_limit: 12
  write_sidecar_markers: false
  failed_retry_cooldown_hours: 24
  max_failures_per_file: 1
  file_extensions:
    - .mkv
    - .mp4
    - .avi
    - .mov
  processed_marker_suffix: .simpleripper.done.json
  lock_suffix: .simpleripper.lock
  exclude_paths:
    - /.ripper_state/
    - /.ripper_quarantine/
    - /.simpleripper_quarantine/
    - /.simpleripper_locks/
    - /@eaDir/
    - /#recycle/

safety:
  min_free_disk_gb: 20

quality_profiles:
  default:
    encoder: libx265
    crf: 24
    preset: medium
    pix_fmt: yuv420p10le
    audio: copy
    subtitles: copy
  movie:
    encoder: libx265
    crf: 23
    preset: medium
    pix_fmt: yuv420p10le
    audio: copy
    subtitles: copy

retention_size_policy:
  enabled: true
  series:
    max_mb_per_25min: 500
  anime:
    max_mb_per_25min: 500
  movie:
    max_mb_per_25min: 500
  unknown:
    max_mb_per_25min: 500

track_policy:
  enabled: true
  target_audio_languages:
    - cze
  drop_other_audio_if_target_found: true
  keep_subtitles: true

skip_rules:
  skip_hevc: true
  hevc_reprocess_min_size_mb: 12000
  hevc_reprocess_warning_multiplier: 1.75
  skip_av1: true
  skip_4k: true
  skip_hdr: true
  min_duration_seconds: 300
  min_size_mb: 200

jellyfin:
  enabled: false
  server_url: http://127.0.0.1:8096
  api_key: ""
  path_mapping: []
  path_lookup_enabled: true
  path_lookup_limit: 1000
  path_lookup_max_pages: 20
  sqlite_db_path: ""

verification:
  max_duration_diff_seconds: 2
  max_output_source_ratio: 0.95
  low_ratio_warning: 0.15
  bitrate_thresholds:
    anime:
      1080p:
        hard_fail_kbps: 500
        warning_kbps: 700
    series:
      1080p:
        hard_fail_kbps: 900
        warning_kbps: 1200
    movie:
      1080p:
        hard_fail_kbps: 1200
        warning_kbps: 1800
    default:
      1080p:
        hard_fail_kbps: 900
        warning_kbps: 1200
